name: Deploy registry

on:
  push:
    branches: [main]
  workflow_dispatch:

# Start read-only; the deploy job adds the Pages permissions it needs.
permissions:
  contents: read

# Never cancel a deployment in progress; queue runs on a single Pages group.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm registry:build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
